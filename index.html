<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        #weather { display: flex; flex-direction: column; align-items: center; }
        .error { color: red; }
    </style>
</head>
<body>
    <div id="weather">
        <h1>Weather Dashboard</h1>
        <input type="text" id="location" placeholder="Enter a location">
        <button id="fetch-button">Fetch Weather</button>
        <div id="current-weather"></div>
        <div id="forecast"></div>
        <div class="error" id="error-message"></div>
    </div>
    <script>
        const fetchWeather = async () => {
            const location = document.getElementById('location').value;
            const errorMessage = document.getElementById('error-message');
            errorMessage.textContent = '';
            if (!location) {
                errorMessage.textContent = 'Please enter a location.';
                return;
            }
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current_weather=true&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=Asia/Tokyo`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                displayCurrentWeather(data.current_weather);
                displayForecast(data.daily);
            } catch (error) {
                errorMessage.textContent = `Error fetching weather data: ${error.message}`;
            }
        };
        const displayCurrentWeather = (currentWeather) => {
            const currentWeatherDiv = document.getElementById('current-weather');
            currentWeatherDiv.innerHTML = `<h2>Current Weather</h2> <p>Temperature: ${currentWeather.temperature} °C</p>`;
        };
        const displayForecast = (daily) => {
            const forecastDiv = document.getElementById('forecast');
            forecastDiv.innerHTML = '<h2>7-Day Forecast</h2>' + daily.temperature_2m_max.map((tempMax, index) => `<p>Day ${index + 1}: Max ${tempMax} °C, Min ${daily.temperature_2m_min[index]} °C</p>`).join('');
        };
        document.getElementById('fetch-button').addEventListener('click', fetchWeather);
    </script>
</body>
</html>
